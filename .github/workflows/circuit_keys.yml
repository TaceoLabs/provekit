name: Generate Age Check Circuit Keys

on:
  workflow_dispatch:

env:
  BUCKET_NAME: "provekit"
  CIRCUIT_DIR: "noir-examples/noir-passport/fragmented/merkle_age_check"
  KEYS_NAME: "agecheck"
  CIRCUITS: "t_add_dsc_720 t_add_id_data_720 t_add_integrity_commit t_attest"


permissions:
  contents: read

jobs:
    generate-circuit-keys:
        name: Generate Age Check Circuit Keys
        runs-on: [self-hosted, Linux, ARM64, provekit-build]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Rust toolchain, cache and bins
              uses: moonrepo/setup-rust@v1
              with:
                  channel: nightly-2025-04-05
                  cache-base: main
                  components: rustfmt, clippy

            - name: Check gsutil
              run: |
                which gsutil || echo "gsutil not found"
                gsutil --version

            - name: Build provekit-cli
              run: cargo build --release --bin provekit-cli

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: 1.24

            - name: Setup Noir toolchain
              uses: noir-lang/noirup@v0.1.2
              with:
                  toolchain: v1.0.0-beta.11

            - name: Compile Nargo circuits 
              working-directory: ${{ env.CIRCUIT_DIR }}
              run: |
                for circuit in ${{ env.CIRCUITS }}; do
                  echo "Compiling $circuit"
                  nargo compile --force --print-acir --package "$circuit"
                  echo "Compiled $circuit"
                done

            - name: Prepare circuits (generate proving artifacts)
              working-directory: ${{ env.CIRCUIT_DIR }}
              run: |
                for circuit in ${{ env.CIRCUITS }}; do
                  echo "Preparing $circuit"
                  cargo run --release --bin provekit-cli prepare ./target/$circuit.json \
                    --pkp ./benchmark-inputs/$circuit-prover.pkp \
                    --pkv ./benchmark-inputs/$circuit-verifier.pkv
                  echo "Prepared $circuit"
                done

            - name: Generate proofs for all circuits
              working-directory: ${{ env.CIRCUIT_DIR }}
              run: |
                for circuit in ${{ env.CIRCUITS }}; do
                  echo "Proving $circuit"
                  cargo run --release --bin provekit-cli prove \
                    ./benchmark-inputs/$circuit-prover.pkp \
                    ./benchmark-inputs/tbs_720/$circuit.toml \
                    -o ./benchmark-inputs/$circuit-proof.np
                  echo "Proved $circuit"
                done

            - name: Generate Gnark inputs (t_attest only)
              working-directory: ${{ env.CIRCUIT_DIR }}
              run: |
                cargo run --release --bin provekit-cli generate-gnark-inputs \
                  ./benchmark-inputs/t_attest-prover.pkp \
                  ./benchmark-inputs/t_attest-proof.np
                
            - name: Run Gnark verifier 
              working-directory: recursive-verifier
              run: |
                go run cmd/cli/main.go --config "../${{ env.CIRCUIT_DIR }}/params_for_recursive_verifier" --r1cs "../${{ env.CIRCUIT_DIR }}/r1cs.json" --saveKeys "./keys"

            - name: List keys
              working-directory: recursive-verifier
              run: |
                ls -la ./keys/*.bin || echo "No keys"

            - name: Upload keys to gcp 
              working-directory: recursive-verifier
              run: |
                # Upload Gnark verifier keys for t_attest
                PK_FILE=$(ls -t ./keys/pk_*.bin 2>/dev/null | head -1)
                VK_FILE=$(ls -t ./keys/vk_*.bin 2>/dev/null | head -1)

                if [ -z "$PK_FILE" ] || [ -z "$VK_FILE" ]; then
                  echo "Error: Could not find Gnark keys"
                  exit 1
                fi

                echo "Found PK file: $PK_FILE"
                echo "Found VK file: $VK_FILE"

                ATTEST_PK_NAME="${{ env.KEYS_NAME }}_t_attest_$(basename "$PK_FILE")"
                ATTEST_VK_NAME="${{ env.KEYS_NAME }}_t_attest_$(basename "$VK_FILE")"

                echo "Uploading PK as: $ATTEST_PK_NAME"
                echo "Uploading VK as: $ATTEST_VK_NAME"

                gsutil cp "$PK_FILE" "gs://${{ env.BUCKET_NAME }}/$ATTEST_PK_NAME"
                gsutil cp "$VK_FILE" "gs://${{ env.BUCKET_NAME }}/$ATTEST_VK_NAME"

                # Upload Noir prover/verifier keys for all 4 circuits
                cd "../${{ env.CIRCUIT_DIR }}"
                for circuit in ${{ env.CIRCUITS }}; do
                  if [ -f "./benchmark-inputs/${circuit}-prover.pkp" ]; then
                    echo "Uploading ${circuit} prover key"
                    gsutil cp "./benchmark-inputs/${circuit}-prover.pkp" "gs://${{ env.BUCKET_NAME }}/${{ env.KEYS_NAME }}_${circuit}-prover.pkp"
                  fi
                  if [ -f "./benchmark-inputs/${circuit}-verifier.pkv" ]; then
                    echo "Uploading ${circuit} verifier key"
                    gsutil cp "./benchmark-inputs/${circuit}-verifier.pkv" "gs://${{ env.BUCKET_NAME }}/${{ env.KEYS_NAME }}_${circuit}-verifier.pkv"
                  fi
                done

            - name: Cleanup local files 
              working-directory: recursive-verifier
              run: |
                echo "Cleaning up local keys..."
                rm -f ./keys/*.bin

